<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <div id="counter">0</div>
        <button onclick="increase()">+ 1 증가</button>
    </div>
    
    <script>
        let count = 0;
        function increase() {
            count++; // 숫자 1 증가
            document.getElementById('counter').innerText = count; // 화면에 반영
        }
    </script>
</body>
</html>
